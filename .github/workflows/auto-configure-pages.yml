name: Auto Configure GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/auto-configure-pages.yml'
      - 'docs/**'

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Attempting to configure GitHub Pages..."

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"source":{"branch":"main","path":"/docs"},"public":true}' \
            https://api.github.com/repos/$GITHUB_REPOSITORY/pages

          echo ""
          echo "GitHub Pages configuration sent!"
          echo "It may take 1-2 minutes to be activated."
          echo "Visit: https://$GITHUB_REPOSITORY_OWNER.github.io/${GITHUB_REPOSITORY#*/}/"

      - name: Create deployment summary
        run: |
          echo "## ✅ GitHub Pages Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Pages is being configured with:" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**: /docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your site will be available at:" >> $GITHUB_STEP_SUMMARY
          echo "https://$GITHUB_REPOSITORY_OWNER.github.io/${GITHUB_REPOSITORY#*/}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please wait 1-2 minutes for changes to take effect." >> $GITHUB_STEP_SUMMARY
