<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLFF Dashboard - Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=./docs/">
    <script>
        // Redirect using JavaScript if meta refresh fails
        if (window.location.pathname === '/' || window.location.pathname === '/kolff-dashboard/') {
            window.location.href = './docs/';
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FFB81C 0%, #FFC947 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #000; margin: 0 0 20px 0; }
        p { color: #666; margin: 0 0 20px 0; }
        a {
            display: inline-block;
            background: #FFB81C;
            color: #000;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        a:hover { background: #E6A41A; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 KOLFF Dashboard</h1>
        <p>Cargando dashboard...</p>

</html>
